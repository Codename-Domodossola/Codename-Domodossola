name: Update MANIFEST.md

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'MANIFEST.md'   # prevents the action triggering itself

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate MANIFEST.md
        run: |
          REPO="Codename-Domodossola/Codename-Domodossola"
          BRANCH="main"
          BASE="https://raw.githubusercontent.com/${REPO}/${BRANCH}"

          {
            echo "# Codename Domodossola — Repository Manifest"
            echo "# Auto-generated by GitHub Actions. Do not edit manually."
            echo "# Fetch this file at the start of a Claude session to unlock full repo access."
            echo ""

            prev_dir=""
            git ls-files --cached --others --exclude-standard | sort | while IFS= read -r f; do
              dir=$(dirname "$f")
              if [ "$dir" != "$prev_dir" ]; then
                echo ""
                echo "## ${dir}"
                prev_dir="$dir"
              fi
              echo "${BASE}/${f}"
            done
          } > MANIFEST.md

      - name: Commit MANIFEST.md
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add MANIFEST.md
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "chore: update MANIFEST.md [skip ci]"
          git push
